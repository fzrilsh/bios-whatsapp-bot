name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project (tsup)
        run: npm run build

      - name: Prepare Release Workspace
        run: |
          mkdir release_workspace
          
          cp -r dist release_workspace/
          
          rsync -av --exclude='database/.baileys_auth' assets/ release_workspace/assets/
          
          cp package.json package-lock.json Dockerfile .env.example release_workspace/

      - name: Push to Build Branch
        run: |
          cd release_workspace
          
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -b build
          
          git add .
          git commit -m "auto-build: deploy production ready files from main"
          
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git build